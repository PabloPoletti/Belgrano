<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plan de partido | Belgrano</title>
  <meta name="description" content="Plan táctico de partido para Belgrano, presentado en formato visual para compartir.">
  <meta property="og:title" content="Plan de partido | Belgrano">
  <meta property="og:description" content="Análisis táctico visual y plan de partido para compartir.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#101827">
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f7fb;
      --color-background-info: #eaf3ff;
      --color-background-warning: #fff7e8;
      --color-background-danger: #fff0f0;
      --color-background-success: #edf8ef;
      --color-text-primary: #121826;
      --color-text-secondary: #3f4a5f;
      --color-text-tertiary: #738096;
      --color-text-info: #155fa0;
      --color-text-danger: #b42318;
      --color-text-success: #247033;
      --color-border-secondary: #d9e0ea;
      --color-border-tertiary: #e7ebf2;
      --color-border-info: #4f9be8;
      --border-radius-lg: 16px;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(16, 91, 185, 0.22), transparent 32rem),
        linear-gradient(180deg, #101827 0%, #172033 18rem, #eef2f7 18rem, #eef2f7 100%);
      color: var(--color-text-secondary);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .hero {
      color: #ffffff;
      padding: 28px 0 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 0;
      max-width: 760px;
      color: #ffffff;
      font-size: clamp(32px, 6vw, 60px);
      line-height: 0.95;
      letter-spacing: -0.055em;
    }

    .hero p {
      max-width: 700px;
      margin: 18px 0 0;
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.65;
    }

    .content-shell {
      overflow: hidden;
      border: 1px solid rgba(16, 24, 39, 0.08);
      border-radius: 28px;
      background: var(--color-background-primary);
      box-shadow: 0 24px 70px rgba(16, 24, 39, 0.2);
    }

    .content-toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--color-border-tertiary);
      background: rgba(245, 247, 251, 0.8);
    }

    .content-toolbar span {
      color: var(--color-text-tertiary);
      font-size: 13px;
    }

    .content-toolbar strong {
      color: var(--color-text-primary);
      font-weight: 650;
    }

    #plan-content {
      padding: clamp(18px, 4vw, 34px);
    }

    .loading,
    .error {
      padding: 18px;
      border-radius: var(--border-radius-lg);
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    a {
      color: #155fa0;
    }

    @media (max-width: 720px) {
      .page {
        padding: 18px 12px 34px;
      }

      .hero {
        padding-top: 18px;
      }

      .content-shell {
        border-radius: 22px;
      }

      #plan-content {
        padding: 16px;
      }

      .grid2,
      .grid3 {
        grid-template-columns: 1fr !important;
      }

      .campo {
        height: 420px !important;
      }

      .sub-row {
        align-items: flex-start !important;
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="eyebrow">Belgrano · Plan táctico</div>
      <h1>Plan de partido contra Argentinos</h1>
      <p>Una presentación visual, ordenada y lista para compartir: diagnóstico, esquema, roles individuales, fases del partido y gestión mental.</p>
    </header>

    <section class="content-shell" aria-label="Plan táctico">
      <div class="content-toolbar">
        <span><strong>Formato:</strong> análisis visual</span>
        <span><strong>Estado:</strong> listo para compartir</span>
      </div>
      <div id="plan-content">
        <div class="loading">Cargando el plan táctico...</div>
      </div>
    </section>
  </main>

  <script>
    const container = document.querySelector("#plan-content");

    fetch("plan_partido_belgrano_dt.html")
      .then((response) => {
        if (!response.ok) {
          throw new Error("No se pudo cargar el archivo del plan.");
        }

        return response.text();
      })
      .then((html) => {
        container.innerHTML = html;
      })
      .catch(() => {
        container.innerHTML = '<div class="error">No se pudo cargar el contenido. Abrí directamente <a href="plan_partido_belgrano_dt.html">el plan táctico</a>.</div>';
      });
  </script>
</body>
</html>
